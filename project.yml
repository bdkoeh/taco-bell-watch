name: TacoBellWatch
options:
  bundleIdPrefix: com.tacobellwatch
  deploymentTarget:
    watchOS: "10.0"
    iOS: "18.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.37.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 264SGEWUH5

targets:
  TacoBellWatchStub:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "18.0"
    sources:
      - path: iOSStub
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tacobellwatch.app
        INFOPLIST_FILE: iOSStub/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        SKIP_INSTALL: "NO"
        INSTALL_PATH: "$(LOCAL_APPS_DIR)"
        PRODUCT_NAME: "TacoBellWatch"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: TacoBellWatch
        embed: true
        codeSign: true

  TacoBellWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: TacoBellWatch
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tacobellwatch.app.watchkitapp
        INFOPLIST_FILE: TacoBellWatch/Info.plist
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        PRODUCT_NAME: "TacoBellWatch"
        PRODUCT_MODULE_NAME: "TacoBellWatch"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "4"
        INFOPLIST_KEY_WKWatchOnly: "YES"
    info:
      path: TacoBellWatch/Info.plist
      properties:
        CFBundleDisplayName: Tbell Compass
        WKApplication: true
        WKWatchOnly: true
        CFBundleIconName: AppIcon
        NSLocationWhenInUseUsageDescription: Taco Bell Watch needs your location to find the nearest Taco Bell and point you toward it.
    entitlements:
      path: TacoBellWatch/TacoBellWatch.entitlements
      properties:
        com.apple.security.app-sandbox: true

schemes:
  TacoBellWatchStub:
    build:
      targets:
        TacoBellWatchStub: all
        TacoBellWatch: all
    run:
      config: Debug
    archive:
      config: Release

  TacoBellWatch:
    build:
      targets:
        TacoBellWatch: all
