<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taco Bell Watch – App Icon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    padding: 40px 20px;
    gap: 40px;
  }

  h1 {
    color: #888;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .row {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-end;
  }

  .icon-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .icon-label {
    color: #666;
    font-size: 10px;
    font-family: 'SF Mono', monospace;
    font-weight: 600;
  }

  .icon-wrap { position: relative; }
  .icon-wrap.xl { width: 200px; height: 200px; }
  .icon-wrap.large { width: 140px; height: 140px; }
  .icon-wrap.med { width: 80px; height: 80px; }
  .icon-wrap.small { width: 48px; height: 48px; }

  .icon {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1A0530;
  }

  .icon svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .icon .taco {
    position: relative;
    z-index: 3;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)) drop-shadow(0 0 12px rgba(190,80,255,0.4));
  }

  .icon-wrap.xl .taco { font-size: 64px; }
  .icon-wrap.large .taco { font-size: 44px; }
  .icon-wrap.med .taco { font-size: 26px; }
  .icon-wrap.small .taco { font-size: 16px; }
</style>
</head>
<body>

<h1>App Icon – E with centered taco</h1>

<div class="row">
  <div class="icon-group">
    <div class="icon-label">200px</div>
    <div class="icon-wrap xl">
      <div class="icon" id="iconXL"></div>
    </div>
  </div>
  <div class="icon-group">
    <div class="icon-label">140px</div>
    <div class="icon-wrap large">
      <div class="icon" id="iconL"></div>
    </div>
  </div>
  <div class="icon-group">
    <div class="icon-label">80px</div>
    <div class="icon-wrap med">
      <div class="icon" id="iconM"></div>
    </div>
  </div>
  <div class="icon-group">
    <div class="icon-label">48px</div>
    <div class="icon-wrap small">
      <div class="icon" id="iconS"></div>
    </div>
  </div>
</div>

<script>
function buildIcon(container) {
  const size = container.offsetWidth;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 180 180');
  svg.setAttribute('fill', 'none');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';

  const cx = 90, cy = 90;

  // Outer ring
  const outerRing = document.createElementNS(svgNS, 'circle');
  outerRing.setAttribute('cx', cx);
  outerRing.setAttribute('cy', cy);
  outerRing.setAttribute('r', 78);
  outerRing.setAttribute('stroke', 'rgba(190,80,255,0.2)');
  outerRing.setAttribute('stroke-width', '1.5');
  svg.appendChild(outerRing);

  // Inner ring
  const innerRing = document.createElementNS(svgNS, 'circle');
  innerRing.setAttribute('cx', cx);
  innerRing.setAttribute('cy', cy);
  innerRing.setAttribute('r', 55);
  innerRing.setAttribute('stroke', 'rgba(104,42,141,0.12)');
  innerRing.setAttribute('stroke-width', '0.7');
  svg.appendChild(innerRing);

  // Tick marks
  for (let i = 0; i < 72; i++) {
    const angle = (i * 5 - 90) * Math.PI / 180;
    const isMajor = i % 6 === 0;
    const isCardinal = i % 18 === 0;
    const outerR = 78;
    const innerR = outerR - (isMajor ? 8 : 3);

    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', cx + Math.cos(angle) * outerR);
    line.setAttribute('y1', cy + Math.sin(angle) * outerR);
    line.setAttribute('x2', cx + Math.cos(angle) * innerR);
    line.setAttribute('y2', cy + Math.sin(angle) * innerR);

    if (isCardinal) {
      line.setAttribute('stroke', i === 0 ? 'rgba(230,60,180,0.6)' : 'rgba(160,126,186,0.35)');
      line.setAttribute('stroke-width', '2.5');
    } else if (isMajor) {
      line.setAttribute('stroke', 'rgba(190,80,255,0.3)');
      line.setAttribute('stroke-width', '1.5');
    } else {
      line.setAttribute('stroke', 'rgba(104,42,141,0.2)');
      line.setAttribute('stroke-width', '0.5');
    }
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }

  // Compass needle (behind the taco)
  const defs = document.createElementNS(svgNS, 'defs');

  const grad = document.createElementNS(svgNS, 'linearGradient');
  grad.setAttribute('id', 'ng_' + size);
  grad.setAttribute('x1', '90'); grad.setAttribute('y1', '20');
  grad.setAttribute('x2', '90'); grad.setAttribute('y2', '160');
  grad.setAttribute('gradientUnits', 'userSpaceOnUse');
  const stop1 = document.createElementNS(svgNS, 'stop');
  stop1.setAttribute('offset', '0'); stop1.setAttribute('stop-color', '#E63CB4');
  const stop2 = document.createElementNS(svgNS, 'stop');
  stop2.setAttribute('offset', '1'); stop2.setAttribute('stop-color', '#682A8D');
  stop2.setAttribute('stop-opacity', '0.5');
  grad.appendChild(stop1); grad.appendChild(stop2);
  defs.appendChild(grad);

  const glow = document.createElementNS(svgNS, 'filter');
  glow.setAttribute('id', 'glow_' + size);
  const blur = document.createElementNS(svgNS, 'feGaussianBlur');
  blur.setAttribute('stdDeviation', '3'); blur.setAttribute('result', 'blur');
  glow.appendChild(blur);
  const merge = document.createElementNS(svgNS, 'feMerge');
  const mn1 = document.createElementNS(svgNS, 'feMergeNode');
  mn1.setAttribute('in', 'blur');
  const mn2 = document.createElementNS(svgNS, 'feMergeNode');
  mn2.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mn1); merge.appendChild(mn2);
  glow.appendChild(merge);
  defs.appendChild(glow);
  svg.appendChild(defs);

  // Needle path
  const needle = document.createElementNS(svgNS, 'path');
  // Needle rotated -45deg (northwest) via transform
  needle.setAttribute('d', 'M90 22 Q97 50 100 85 L94 152 Q90 158 86 152 L80 85 Q83 50 90 22Z');
  needle.setAttribute('transform', 'rotate(-45 90 90)');
  needle.setAttribute('fill', `url(#ng_${size})`);
  needle.setAttribute('filter', `url(#glow_${size})`);
  svg.appendChild(needle);

  // Center dot bg
  const hubBg = document.createElementNS(svgNS, 'circle');
  hubBg.setAttribute('cx', cx); hubBg.setAttribute('cy', cy);
  hubBg.setAttribute('r', '8'); hubBg.setAttribute('fill', '#2D0A48');
  svg.appendChild(hubBg);

  container.appendChild(svg);

  // Taco emoji
  const taco = document.createElement('span');
  taco.className = 'taco';
  taco.textContent = '🌮';
  container.appendChild(taco);
}

buildIcon(document.getElementById('iconXL'));
buildIcon(document.getElementById('iconL'));
buildIcon(document.getElementById('iconM'));
buildIcon(document.getElementById('iconS'));
</script>
</body>
</html>
